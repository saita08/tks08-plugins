name: Release

on:
  push:
    branches: [main]
    paths: [CHANGELOG.md]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract latest version from CHANGELOG
        id: changelog
        run: |
          # Get the first version heading (latest release)
          version=$(grep -m1 -oP '## \[\K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md)
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

          # Extract release notes for this version (content between first and second ## heading)
          awk '/^## \['"${version}"'\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md > release_notes.md
          echo "Found version: ${version}"
          cat release_notes.md

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.changelog.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag "${{ steps.changelog.outputs.tag }}"
          git push origin "${{ steps.changelog.outputs.tag }}"
          gh release create "${{ steps.changelog.outputs.tag }}" \
            --title "${{ steps.changelog.outputs.tag }}" \
            --notes-file release_notes.md
